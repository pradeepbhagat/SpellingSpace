<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Phoneme Sound Tester</title>
<style>
  :root{color-scheme:dark}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:#1a1030;color:#fff;padding:18px 14px 60px;}
  h1{font-size:22px;margin:0 0 6px}
  p.lead{opacity:.85;font-size:15px;line-height:1.4;margin:0 0 18px}
  .card{background:#2a1b47;border-radius:16px;padding:14px;margin:0 0 18px;
    box-shadow:0 4px 0 #00000030}
  .letter{font-size:40px;font-weight:900;color:#ffd166;margin:0 0 4px}
  .hint{font-size:13px;opacity:.7;margin:0 0 12px}
  .btns{display:flex;flex-wrap:wrap;gap:10px}
  button.cand{flex:1 1 42%;min-height:64px;border:0;border-radius:14px;
    font-size:20px;font-weight:800;color:#241533;
    background:linear-gradient(#ffe58a,#ffc93c);box-shadow:0 4px 0 #b8871f;
    cursor:pointer;transition:transform .08s}
  button.cand:active{transform:translateY(3px);box-shadow:0 1px 0 #b8871f}
  button.cand small{display:block;font-size:12px;font-weight:600;opacity:.65;margin-top:2px}
  button.cand.picked{outline:4px solid #6cf;background:linear-gradient(#c9f7c1,#7ee06a)}
  .pickrow{margin-top:10px;font-size:15px;min-height:22px;color:#9fe6a0;font-weight:700}
  #summary{position:fixed;left:0;right:0;bottom:0;background:#120a24;
    border-top:2px solid #ffd16655;padding:12px 14px;font-size:14px;line-height:1.5}
  #summary b{color:#ffd166}
  .copy{margin-top:8px}
  .copy button{background:#6cf;color:#03263b;border:0;border-radius:10px;
    padding:8px 14px;font-weight:800;font-size:14px}
</style>
</head>
<body>
  <h1>🔊 Phoneme Sound Tester</h1>
  <p class="lead">Tap each yellow button to hear a sound. For every letter, pick the one
    that sounds <b>clearest and least weird</b> to your ear — it turns green.
    When you've picked one for each letter, read me the summary at the bottom.</p>
  <div id="cards"></div>

  <div id="summary">Picks so far: <span id="picks">— none yet —</span>
    <div class="copy"><button id="copyBtn">Copy picks</button></div>
  </div>

<script>
const HINTS={
  s:"the snake /s/ sound", f:"the /f/ sound", v:"the /v/ sound",
  r:"the /r/ sound", c:"the hard /k/ sound (as in cat)",
  g:"the hard /g/ sound (as in go)", i:"the short /i/ (as in it / igloo)"
};
const picks={};
let audio=new Audio();
function play(file){
  audio.pause(); audio=new Audio('ptest/'+file); audio.play().catch(()=>{});
}
function render(manifest){
  const wrap=document.getElementById('cards');
  Object.keys(manifest).forEach(letter=>{
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<div class="letter">${letter.toUpperCase()} / ${letter}</div>
      <div class="hint">${HINTS[letter]||''}</div>`;
    const btns=document.createElement('div'); btns.className='btns';
    manifest[letter].forEach(c=>{
      const b=document.createElement('button');
      b.className='cand';
      b.innerHTML=`▶ "${c.spell}"<small>tap to hear</small>`;
      b.onclick=()=>{
        play(c.file);
        [...btns.children].forEach(x=>x.classList.remove('picked'));
        b.classList.add('picked');
        picks[letter]=c.spell;
        updateSummary();
      };
      btns.appendChild(b);
    });
    card.appendChild(btns);
    wrap.appendChild(card);
  });
}
function updateSummary(){
  const order=['s','f','v','r','c','g','i'];
  const parts=order.filter(l=>picks[l]).map(l=>`${l}=${picks[l]}`);
  document.getElementById('picks').textContent=parts.length?parts.join('  '):'— none yet —';
}
document.getElementById('copyBtn').onclick=()=>{
  const order=['s','f','v','r','c','g','i'];
  const txt=order.filter(l=>picks[l]).map(l=>`${l}=${picks[l]}`).join(' ');
  navigator.clipboard&&navigator.clipboard.writeText(txt);
  document.getElementById('copyBtn').textContent='Copied!';
  setTimeout(()=>document.getElementById('copyBtn').textContent='Copy picks',1200);
};
fetch('ptest/manifest.json').then(r=>r.json()).then(render);
</script>
</body>
</html>
